<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Saathi — Adoption Copilot</title>
<style>
  :root {
    --ink:#12183A; --indigo:#1E2761; --saffron:#F2A73B; --teal:#17A398;
    --ice:#C9D2F0; --mute:#6B7280; --bg:#F5F6FB; --card:#FFFFFF;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:#1B2033; }
  .wrap { max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;
          background:var(--card); box-shadow:0 0 40px rgba(18,24,58,.08); }
  header { background:var(--ink); color:#fff; padding:16px 20px; }
  header .brand { font-size:22px; font-weight:700; letter-spacing:.3px; }
  header .brand span { color:var(--saffron); }
  header .sub { font-size:12px; color:var(--ice); margin-top:2px; }
  .who { display:flex; gap:10px; align-items:center; padding:12px 20px; border-bottom:1px solid #eef0f7; }
  .who select { flex:1; padding:8px 10px; border:1px solid #d7dbea; border-radius:8px; font-size:14px; }
  .who .ctx { font-size:12px; color:var(--mute); white-space:nowrap; }
  #chat { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:82%; padding:10px 13px; border-radius:14px; font-size:14.5px; line-height:1.4; }
  .bot { background:#eef1fb; color:#1B2033; align-self:flex-start; border-bottom-left-radius:4px; }
  .user { background:var(--indigo); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .consent { align-self:flex-start; max-width:90%; background:var(--card); border:1px solid #e6e8f2;
             border-radius:14px; padding:14px; box-shadow:0 6px 18px rgba(18,24,58,.10); }
  .consent h4 { margin:0 0 4px; font-size:13px; color:var(--saffron); text-transform:uppercase; letter-spacing:1px; }
  .consent .sum { font-size:16px; font-weight:600; margin:2px 0 10px; }
  .consent .row { display:flex; gap:8px; }
  .consent input { flex:1; padding:9px 10px; border:1px solid #d7dbea; border-radius:8px; font-size:15px; }
  .consent .hint { font-size:11px; color:var(--mute); margin-top:8px; }
  button { border:0; border-radius:8px; cursor:pointer; font-weight:600; }
  .go { background:var(--teal); color:#fff; padding:9px 16px; }
  .done { align-self:flex-start; background:#e5f5f2; color:#0e6b60; border:1px solid #bfe6df;
          border-radius:12px; padding:10px 13px; font-size:14px; font-weight:600; }
  .composer { display:flex; gap:8px; padding:12px 16px; border-top:1px solid #eef0f7; }
  .composer input { flex:1; padding:11px 13px; border:1px solid #d7dbea; border-radius:22px; font-size:15px; }
  .composer button { background:var(--saffron); color:#3a2500; padding:0 18px; }
  .footlink { text-align:center; font-size:11px; color:var(--mute); padding:0 0 10px; }
  .footlink a { color:var(--indigo); cursor:pointer; text-decoration:underline; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; padding:0 20px 10px; }
  .chip { font-size:12px; background:#eef1fb; color:var(--indigo); padding:6px 10px; border-radius:14px; cursor:pointer; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Saa<span>thi</span></div>
    <div class="sub">Your banking helper · SBI · demo prototype</div>
  </header>

  <div class="who">
    <select id="cust"></select>
    <div class="ctx" id="ctx"></div>
  </div>

  <div id="chat"></div>

  <div class="chips">
    <span class="chip" onclick="quick('I have some money just sitting there, what can I do?')">Idle money?</span>
    <span class="chip" onclick="quick('Tell me about SIP')">SIP</span>
    <span class="chip" onclick="quick('term insurance')">Insurance</span>
    <span class="chip" onclick="quick('what is my balance')">Balance</span>
  </div>

  <div class="composer">
    <input id="box" placeholder="Type a message…" autocomplete="off"
           onkeydown="if(event.key==='Enter')send()" />
    <button onclick="send()">Send</button>
  </div>
  <div class="footlink"><a onclick="showAudit()">View audit trail</a></div>
</div>

<script>
const chat = document.getElementById('chat');
const custSel = document.getElementById('cust');
let CID = null;

function bubble(text, cls){
  const d = document.createElement('div');
  d.className = 'msg ' + cls; d.textContent = text;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}

async function loadCustomers(){
  const list = await (await fetch('/api/customers')).json();
  custSel.innerHTML = list.map(c =>
    `<option value="${c.id}">${c.name} · ${c.occupation}</option>`).join('');
  custSel.onchange = pickCustomer;
  pickCustomer();
}

async function pickCustomer(){
  CID = custSel.value;
  chat.innerHTML = '';
  const c = await (await fetch('/api/customer/'+CID)).json();
  document.getElementById('ctx').textContent =
    '₹' + c.savings_balance.toLocaleString('en-IN') + ' · ' + c.language.toUpperCase();
  bubble('Namaste ' + c.name.split(' ')[0] + "! Ask me what to do with idle money, or about an FD, SIP or insurance.", 'bot');
}

function quick(t){ document.getElementById('box').value = t; send(); }

async function send(){
  const box = document.getElementById('box');
  const text = box.value.trim();
  if(!text) return;
  box.value = '';
  bubble(text, 'user');
  const res = await (await fetch('/api/chat', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({customer_id: CID, message: text})
  })).json();
  bubble(res.reply, 'bot');
  if(res.proposal) consentCard(res.proposal);
}

function consentCard(a){
  const d = document.createElement('div');
  d.className = 'consent';
  d.innerHTML = `
    <h4>Confirm to continue</h4>
    <div class="sum">${a.summary}</div>
    <div class="row">
      <input id="otp" placeholder="Enter OTP" inputmode="numeric" />
      <button class="go" id="goBtn">Confirm</button>
    </div>
    <div class="hint">Demo OTP: <b>${a.otp_hint}</b> · nothing moves until you confirm.</div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
  d.querySelector('#goBtn').onclick = async () => {
    const otp = d.querySelector('#otp').value;
    const r = await (await fetch('/api/confirm', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({customer_id: CID, otp})
    })).json();
    if(r.ok){
      d.remove();
      const done = document.createElement('div');
      done.className = 'done'; done.textContent = '✓ ' + r.message;
      chat.appendChild(done); chat.scrollTop = chat.scrollHeight;
    } else {
      bubble(r.message, 'bot');
    }
  };
}

async function showAudit(){
  const log = await (await fetch('/api/audit/'+CID)).json();
  if(!log.length){ bubble('No actions logged yet for this customer.', 'bot'); return; }
  bubble('Audit trail:\n' + log.map(e => `• ${e.ts} — ${e.action}: ${e.detail}`).join('\n'), 'bot');
}

loadCustomers();
</script>
</body>
</html>
